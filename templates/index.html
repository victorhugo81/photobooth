<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobooth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body class="theme-{{ ui_theme }}">

<header class="site-header">
  <div class="film-line"></div>
  <h1 class="site-title">PHOTOBOOTH</h1>
  <div class="film-line bottom"></div>

  <div class="header-actions">
    {% if gallery_url %}
    <a href="{{ gallery_url }}" target="_blank" rel="noopener">Gallery</a>
    {% endif %}
    <a href="/gallery">Gallery</a>
    <a href="/live-show">Live Show</a>
    <a href="/admin">&#9881; Settings</a>
  </div>
</header>

<div class="container flex-grow-1">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div id="video-wrapper">
        <img id="video-feed" src="/video_feed" alt="Live preview">
      </div>

      <!-- Background picker -->
      <div class="mt-4 mb-1">
        <div class="d-flex align-items-center justify-content-center gap-3 flex-wrap">
          <button id="bg-modal-btn" class="btn btn-outline-secondary px-4" data-bs-toggle="modal" data-bs-target="#bg-modal">
            Choose Background
          </button>
        </div>
        <div id="bg-selected-label" class="mt-2 text-center text-muted small">None selected</div>
      </div>

      <div class="text-center mt-4">
        <button id="capture-btn" class="btn">TAKE PHOTO</button>
      </div>

      <div id="loading-msg" class="text-center mt-3">
        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
        Processing&hellip;
      </div>

      <div id="error-msg" class="text-center mt-3 text-danger" style="display:none"></div>

    </div>
  </div>
</div>

<!-- Background modal -->
<div class="modal fade" id="bg-modal" tabindex="-1" aria-labelledby="bg-modal-title" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="bg-modal-title">Choose Background</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="bg-grid" class="picker-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- Countdown overlay -->
<div id="countdown-overlay">
  <span id="countdown-number">3</span>
</div>

<!-- QR overlay -->
<div id="qr-overlay">
  <h2 id="qr-overlay-heading">Scan to get your photo!</h2>
  <img id="qr-img" src="" alt="QR code">
  <p id="qr-timer">Returning in 20s&hellip;</p>
  <button id="qr-close-btn" class="btn btn-outline-secondary btn-sm">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
