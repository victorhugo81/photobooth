<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Photobooth Photo</title>

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="{{ share_url }}">
  <meta property="og:title"       content="Check out my photobooth photo!">
  <meta property="og:description" content="Captured at the photobooth. Tap to view and download.">
  <meta property="og:image"       content="{{ r2_url }}">
  <meta property="og:image:type"  content="image/jpeg">

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Check out my photobooth photo!">
  <meta name="twitter:description" content="Captured at the photobooth.">
  <meta name="twitter:image"       content="{{ r2_url }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; }
    .photo-card {
      max-width: 680px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      overflow: hidden;
    }
    .photo-card img {
      width: 100%;
      display: block;
    }
    .share-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      padding: 1.5rem;
    }
    .share-bar .btn {
      min-width: 130px;
      font-weight: 500;
    }
    .filename {
      font-size: 0.78rem;
      color: #aaa;
      text-align: center;
      padding-bottom: 1rem;
    }
    .btn-x     { background: #000; color: #fff; border-color: #000; }
    .btn-x:hover { background: #222; border-color: #222; color: #fff; }
    .btn-fb    { background: #1877f2; color: #fff; border-color: #1877f2; }
    .btn-fb:hover { background: #1558b0; border-color: #1558b0; color: #fff; }
    .btn-wa    { background: #25d366; color: #fff; border-color: #25d366; }
    .btn-wa:hover { background: #1eab52; border-color: #1eab52; color: #fff; }
  </style>
</head>
<body class="py-5">

<div class="container">
  <h1 class="text-center fw-bold mb-4">Your Photo</h1>

  <div class="photo-card">
    <img src="{{ r2_url }}" alt="Photobooth photo" loading="lazy">

    <div class="share-bar">
      <!-- Download -->
      <a href="{{ r2_url }}" download="{{ filename }}" class="btn btn-primary">
        Download
      </a>

      <!-- Share on X (Twitter) -->
      <a href="{{ tweet_url }}" target="_blank" rel="noopener noreferrer"
         class="btn btn-x">
        Share on X
      </a>

      <!-- Share on Facebook -->
      <a href="{{ fb_url }}" target="_blank" rel="noopener noreferrer"
         class="btn btn-fb">
        Facebook
      </a>

      <!-- Share on WhatsApp -->
      <a href="{{ wa_url }}" target="_blank" rel="noopener noreferrer"
         class="btn btn-wa">
        WhatsApp
      </a>
    </div>

    <p class="filename">{{ filename }}</p>
  </div>

  <p class="text-center text-muted mt-4 small">
    Powered by <strong>Photobooth</strong>
  </p>
</div>

</body>
</html>
