<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backgrounds — Photobooth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<header class="site-header">
  <div class="film-line"></div>
  <div class="site-title">PHOTOBOOTH</div>
  <div class="site-subtitle">BACKGROUNDS</div>
  <div class="film-line bottom"></div>

  <div class="header-actions">
    {% if gallery_url %}
    <a href="{{ gallery_url }}" target="_blank" rel="noopener">Gallery</a>
    {% endif %}
    <a href="/photos">&#128247; Photos</a>
    <a href="/">← Photobooth</a>
  </div>
</header>

<div class="container pb-5" style="max-width:900px">

  <!-- Upload zone -->
  <div id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">&#128247;</div>
    <h5>Drop images here or click to upload</h5>
    <p>JPG &middot; PNG &middot; WEBP &nbsp;&mdash;&nbsp; up to 20 MB each &nbsp;&mdash;&nbsp; multiple files OK</p>
    <input type="file" id="file-input" accept="image/*" multiple hidden>
  </div>

  <div id="upload-progress" class="mt-3">
    <div class="progress">
      <div id="progress-bar" class="progress-bar" style="width:0%"></div>
    </div>
    <p id="progress-label" class="text-center mt-1"></p>
  </div>

  <!-- Grid -->
  <div class="d-flex align-items-center justify-content-between mt-4 mb-3">
    <span class="section-heading">Images</span>
    <span id="bg-count" style="font-size:0.75rem;color:#333"></span>
  </div>

  <div id="bg-grid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-3"></div>

  <p id="empty-msg" class="text-center mt-5" style="display:none">No backgrounds yet</p>
</div>

<div id="toast-container"></div>

<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
