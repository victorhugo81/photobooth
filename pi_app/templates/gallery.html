<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Photobooth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/gallery.css') }}">
</head>
<body class="event-{{ event }}">

<header class="site-header">
  <div class="film-line"></div>
  <div class="site-title">PHOTOBOOTH</div>
  <div class="site-subtitle">GALLERY</div>
  <div class="film-line bottom"></div>

  <div class="header-actions">
    {% if gallery_url %}
    <a href="{{ gallery_url }}" target="_blank" rel="noopener">Slideshow</a>
    {% endif %}
    <a href="/">Photobooth</a>
  </div>
</header>

<div class="container pb-5" style="max-width:900px">

  <div class="d-flex align-items-center justify-content-between mt-4 mb-3">
    <span class="section-heading">Captured Photos</span>
    <span id="photo-count">{{ photos|length }} photo{{ 's' if photos|length != 1 else '' }}</span>
  </div>

  {% if photos %}
  <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-3">
    {% for photo in photos %}
    <div class="col">
      <a class="photo-card"
         href="{{ share_site_url }}/?f={{ photo.filename }}"
         target="_blank" rel="noopener">
        <img src="{{ photo.r2_url }}" alt="{{ photo.filename }}" loading="lazy">

      </a>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p id="empty-msg" class="text-center mt-5">No photos yet</p>
  {% endif %}

</div>

</body>
</html>
